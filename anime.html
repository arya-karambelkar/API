<!DOCTYPE html>
<html>
<head>
  <title>jQuery Toggle Animation</title>

  <!-- jQuery CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    #box {
      width: 300px;
      height: 150px;
      background: #4CAF50;
      color: white;
      line-height: 150px;
      margin: 20px auto;
      border-radius: 10px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>🎬 jQuery Animation Demo</h2>

<button id="hideBtn">Hide</button>
<button id="showBtn">Show</button>
<button id="toggleBtn">Toggle</button>

<div id="box">Hello! I animate 🎉</div>

<script>
$(document).ready(function(){

    // Hide with animation
    $("#hideBtn").click(function(){
        $("#box").hide(1000); // 1 second
    });

    // Show with animation
    $("#showBtn").click(function(){
        $("#box").show(1000);
    });

    // Toggle with animation
    $("#toggleBtn").click(function(){
        $("#box").toggle(1000);
    });

});
</script>

</body>
</html>
